<svg viewBox="0 0 260 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="2" width="56" height="56" rx="11" fill="#1a1a1a"/>

  <!-- Floor plan grid lines -->
  <rect x="8"  y="10" width="19" height="16" fill="none" stroke="#2e2e2e" stroke-width="0.7"/>
  <rect x="27" y="10" width="16" height="16" fill="none" stroke="#2e2e2e" stroke-width="0.7"/>
  <rect x="8"  y="26" width="35" height="16" fill="none" stroke="#2e2e2e" stroke-width="0.7"/>

  <!-- Highlighted first cell -->
  <rect x="8.4" y="10.4" width="18.2" height="15.2" fill="#4ade80" opacity="0.15"/>

  <!-- Checkmark -->
  <polyline points="11,18 17,24 26,13" fill="none" stroke="url(#greenGrad)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Corner brackets -->
  <line x1="4"  y1="7"  x2="9"  y2="7"  stroke="#4ade80" stroke-width="1.1" opacity="0.7"/>
  <line x1="4"  y1="7"  x2="4"  y2="12" stroke="#4ade80" stroke-width="1.1" opacity="0.7"/>
  <line x1="52" y1="7"  x2="47" y2="7"  stroke="#4ade80" stroke-width="1.1" opacity="0.7"/>
  <line x1="52" y1="7"  x2="52" y2="12" stroke="#4ade80" stroke-width="1.1" opacity="0.7"/>
  <line x1="4"  y1="53" x2="9"  y2="53" stroke="#4ade80" stroke-width="1.1" opacity="0.7"/>
  <line x1="4"  y1="53" x2="4"  y2="48" stroke="#4ade80" stroke-width="1.1" opacity="0.7"/>
  <line x1="52" y1="53" x2="47" y2="53" stroke="#4ade80" stroke-width="1.1" opacity="0.7"/>
  <line x1="52" y1="53" x2="52" y2="48" stroke="#4ade80" stroke-width="1.1" opacity="0.7"/>

  <!-- Wordmark: "covrd" -->
  <text
    x="70"
    y="37"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="42"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#f3f4f6"
  >covrd</text>

  <!-- Tagline: "PRODUCTION TRACKING" -->
  <text
    x="71"
    y="54"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="7.5"
    font-weight="500"
    letter-spacing="2"
    fill="#4ade80"
    opacity="0.8"
  >PRODUCTION TRACKING</text>
</svg>
